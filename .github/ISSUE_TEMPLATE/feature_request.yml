name: Feature request
description: Propose a new feature, surface, or behavior change.
title: "[feat]: "
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Per `CONTRIBUTING.md`, empyrean isn't accepting external code
        contributions yet — please **don't open a PR**. File a feature
        request, we'll triage and discuss, and if it lands on the
        roadmap we'll implement it ourselves and ping you on the
        merged PR.

        For pure usage / methodology questions ("which uncertainty
        method should I use for …", "how do I …"), use
        [Discussions](https://github.com/Empyrean-Dynamics/empyrean/discussions)
        instead.

  - type: dropdown
    id: channel
    attributes:
      label: Distribution channel
      description: Which surface would the feature primarily live on?
      options:
        - Python wheel
        - Rust crate
        - CLI binary
        - C ABI
        - All / cross-cutting
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: |
        What's the problem you're trying to solve? "I want to do X but
        empyrean's current surface makes me do Y / Z which is awkward
        because …" Concrete and specific beats abstract.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: |
        What would you like to see? If you have a sketch of the API /
        CLI flag / Python signature you'd find natural, paste it. If
        you'd just like the team to figure out the best shape, say so.
      render: markdown
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: |
        What workarounds have you tried, what other tools or libraries
        do this well, and why aren't they sufficient? Helps us
        understand whether the right answer is "add this to empyrean"
        vs "document the existing way" vs "no, use that other tool."
    validations:
      required: false

  - type: textarea
    id: extra
    attributes:
      label: Anything else
      description: References, links, screenshots, prior issues.
    validations:
      required: false
