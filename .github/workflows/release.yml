name: Release

# Step 2 of the two-step release. Triggered by pushing a tag of the form
# `vX.Y.Z` (e.g. `v0.7.0`). The tag MUST point at a commit on `main` that
# (a) has Cargo.toml / pyproject.toml versions all equal to `X.Y.Z` — the
# `verify` job enforces this — and (b) has had its engine checksums pinned by
# prepare-release.yml (step 1). This workflow does NOT build or re-hash the
# hash-pinned libempyrean tarballs; it reuses the exact tarballs prepared in
# step 1, re-verifies them against the committed empyrean-sys/checksums.txt,
# and fails closed on any mismatch. Run prepare-release.yml before tagging.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  # `gh run download` (publish-crates) reuses the libempyrean tarballs that
  # prepare-release.yml built, so this workflow needs to read another run's
  # artifacts. Setting any permission explicitly drops the rest to none, so
  # actions:read must be named even though contents:write is the obvious one.
  actions: read

env:
  CARGO_TERM_COLOR: always
  CARGO_NET_GIT_FETCH_WITH_CLI: true

jobs:
  # ── Verify all distribution-channel versions match the tag ──────
  # Fails the workflow up-front if any of the five Cargo.toml
  # versions or the empyrean-py pyproject.toml version disagree
  # with the tag (or with each other).
  verify:
    name: Verify Versions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure git for private dependencies
        run: git config --global url."https://x-access-token:${{ secrets.GH_PAT }}@github.com/".insteadOf "ssh://git@github.com/"

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          rustflags: ""

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify versions match tag across all distribution channels
        run: |
          set -eu
          tag="${GITHUB_REF#refs/tags/v}"
          echo "Tag version:  $tag"
          echo

          # Pre-release versions are spelled differently per ecosystem:
          # Cargo/SemVer uses `0.7.0-rc.0`, PyPI/PEP 440 uses `0.7.0rc0`.
          # Compare a canonical form (separators stripped) so a pre-release
          # tag matches both; finals are byte-identical everywhere and
          # unaffected.
          canon() { echo "$1" | tr -d '.-'; }

          metadata=$(cargo metadata --no-deps --format-version 1)
          mismatch=0

          # Every crate that ships externally (cargo or wheel).
          # empyrean-c is `publish = false` but its version still ships
          # inside the dylib, so check it too.
          crates=(empyrean empyrean-sys empyrean-c empyrean-cli empyrean-py)
          for crate in "${crates[@]}"; do
            v=$(echo "$metadata" | jq -r --arg name "$crate" '.packages[] | select(.name == $name) | .version')
            if [ -z "$v" ] || [ "$v" = "null" ]; then
              echo "::error::could not read version for crate $crate"
              mismatch=1
              continue
            fi
            if [ "$(canon "$v")" != "$(canon "$tag")" ]; then
              echo "::error::$crate Cargo.toml version is $v, expected $tag"
              mismatch=1
            else
              printf "  OK  %-20s %s\n" "$crate" "$v"
            fi
          done

          # empyrean-py also has a pyproject.toml — that's what PyPI
          # actually publishes against, so it must match too.
          py_version=$(python -c 'import tomllib; print(tomllib.load(open("empyrean-py/pyproject.toml","rb"))["project"]["version"])')
          if [ "$(canon "$py_version")" != "$(canon "$tag")" ]; then
            echo "::error::empyrean-py/pyproject.toml version is $py_version, expected $tag"
            mismatch=1
          else
            printf "  OK  %-20s %s\n" "pyproject.toml" "$py_version"
          fi

          [ "$mismatch" -eq 0 ] || { echo; echo "Version mismatch — refusing to release."; exit 1; }
          echo
          echo "All distribution channels at version $tag."

  # ── Build CLI binary ───────────────────────────────────────
  cli:
    name: CLI (${{ matrix.os }})
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: target/x86_64-unknown-linux-gnu/release/empyrean
            artifact: empyrean-linux-x86_64
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            binary: target/aarch64-unknown-linux-gnu/release/empyrean
            artifact: empyrean-linux-aarch64
          - os: macos-14
            target: aarch64-apple-darwin
            binary: target/aarch64-apple-darwin/release/empyrean
            artifact: empyrean-macos-aarch64
          # Cross-compiled on the arm64 macos-14 runner (the deprecated/scarce
          # Intel macos-13 runner is retired); build target/host differ here.
          - os: macos-14
            target: x86_64-apple-darwin
            binary: target/x86_64-apple-darwin/release/empyrean
            artifact: empyrean-macos-x86_64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure git for private dependencies
        run: git config --global url."https://x-access-token:${{ secrets.GH_PAT }}@github.com/".insteadOf "ssh://git@github.com/"

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: ${{ matrix.target }}
          rustflags: ""

      # The CLI binary links libempyrean (through empyrean-sys's `links`
      # directive, which cargo won't build transitively), so build the
      # cdylib first — otherwise the final link fails with `-lempyrean`
      # not found. Mirrors the wheels / publish-crates jobs.
      - name: Build libempyrean (release)
        run: cargo build -p empyrean-c --release --target ${{ matrix.target }}

      - name: Build CLI (release, stripped)
        run: cargo build --release --bin empyrean --target ${{ matrix.target }}

      - name: Verify stripped + no internal symbol leak
        run: |
          file ${{ matrix.binary }}
          ls -lh ${{ matrix.binary }}
          leaked=$(nm ${{ matrix.binary }} 2>/dev/null | grep -ioE "empyrean_core|villeneuve|scott|nolan|hyperjet" | sort -u || true)
          if [ -n "$leaked" ]; then
            echo "::error::internal crate symbols leaked into the CLI binary:"; echo "$leaked"; exit 1
          fi
          echo "OK: no internal symbols in ${{ matrix.binary }}"

      - name: Package binary
        run: |
          mkdir -p dist
          cp ${{ matrix.binary }} dist/
          cp LICENSE dist/
          cd dist && tar czf ../${{ matrix.artifact }}.tar.gz *

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.tar.gz

  # ── (libempyrean tarballs come from prepare-release.yml) ────
  # The hash-pinned libempyrean-<target>.tar.gz assets are built and pinned by
  # prepare-release.yml BEFORE this tag is cut, because they are not
  # reproducible — re-building here would change their bytes and break
  # verification against the committed checksums. publish-crates downloads those
  # exact tarballs from the Prepare Release run, re-verifies them against
  # empyrean-sys/checksums.txt, and serves them from the release.

  # ── Build the macOS wheels (arm64 + x86_64, abi3) ──────────
  # One abi3 wheel per arch (cp310-abi3-macosx_*): the pyo3/abi3-py310 feature
  # in pyproject makes a single build cover CPython 3.10+, so the matrix spans
  # ARCHITECTURES, not Python minors. Both legs run on the arm64 macos-14 runner
  # (the Intel macos-13 runner is retired) and cross-compile to their target:
  # aarch64-apple-darwin natively and x86_64-apple-darwin cross.
  wheels-macos:
    name: Wheel (macOS ${{ matrix.arch }}, abi3)
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            arch: arm64
            target: aarch64-apple-darwin
            artifact: wheel-macos-arm64
          # Cross-compiled on the arm64 macos-14 runner (the deprecated/scarce
          # Intel macos-13 runner is retired); build target/host differ here.
          - os: macos-14
            arch: x86_64
            target: x86_64-apple-darwin
            artifact: wheel-macos-x86_64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure git for private dependencies
        run: git config --global url."https://x-access-token:${{ secrets.GH_PAT }}@github.com/".insteadOf "ssh://git@github.com/"

      # Any CPython >= 3.10 works as the build interpreter — the abi3 wheel is
      # forward-compatible regardless of which one builds it.
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: ${{ matrix.target }}
          rustflags: ""

      - name: Install maturin
        run: pip install maturin

      # empyrean-sys does NOT depend on empyrean-c as a cargo crate; it opens
      # the engine at run time (dlopen), so maturin won't build the cdylib
      # transitively. Build it first so it exists to bundle below.
      - name: Build libempyrean (release)
        run: cargo build -p empyrean-c --release --target ${{ matrix.target }}

      # Bundle the engine INSIDE the wheel, next to the extension. At run time
      # empyrean-sys finds libempyrean.dylib beside the loaded extension via
      # dladdr (empyrean-sys/src/lib.rs), so the wheel is self-contained and
      # relocatable with no build-machine path baked in. pyproject's
      # [tool.maturin].include ships it in the wheel only.
      - name: Bundle libempyrean beside the extension
        run: |
          set -euo pipefail
          cp target/${{ matrix.target }}/release/libempyrean.dylib empyrean-py/python/empyrean/
          echo "bundled libempyrean.dylib -> empyrean-py/python/empyrean/"

      # delocate (via --auditwheel=repair) vendors external deps of the
      # extension and normalizes the macOS tag; --strip keeps internal symbols
      # out. The bundled engine is not a link-time dep, so delocate leaves it in
      # place beside the extension, found at run time via dladdr.
      - name: Build wheel (stripped, self-contained)
        run: cd empyrean-py && maturin build --release --strip --auditwheel=repair --target ${{ matrix.target }} --out ../target/wheels

      - name: Verify wheel symbols stripped (no internal leak)
        run: |
          whl=$(ls target/wheels/*.whl | head -1)
          tmp=$(mktemp -d)
          python -m zipfile -e "$whl" "$tmp"
          libs=$(find "$tmp" \( -name "*.so" -o -name "*.dylib" \))
          echo "Inspecting bundled libraries:"; echo "$libs"
          leaked=$(for f in $libs; do nm "$f" 2>/dev/null; done | grep -ioE "empyrean_core|villeneuve|scott|nolan|hyperjet" | sort -u || true)
          if [ -n "$leaked" ]; then
            echo "::error::internal crate symbols leaked into the wheel:"; echo "$leaked"; exit 1
          fi
          echo "OK: no internal symbols in the wheel's bundled libraries"

      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: target/wheels/*.whl

  # ── Build the Linux wheels (x86_64 + aarch64, manylinux_2_28, abi3) ──
  # Built INSIDE the manylinux_2_28 container so BOTH the pyo3 extension and the
  # bundled libempyrean link against the same old glibc floor (2.28). The engine
  # is dlopen'd — not a DT_NEEDED of the extension — so auditwheel cannot see it
  # and never folds its glibc requirement into the wheel tag. Building everything
  # against the 2.28 floor is what keeps the manylinux_2_28 tag honest and the
  # wheel installable on older distros. One abi3 wheel per arch (cp310-abi3): the
  # matrix spans ARCHITECTURES (x86_64 + aarch64 on a native Arm runner), not
  # Python minors — abi3-py310 already covers 3.10+ from a single build.
  wheels-linux:
    name: Wheel (${{ matrix.tag }}, abi3)
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            container: quay.io/pypa/manylinux_2_28_x86_64
            tag: manylinux_2_28_x86_64
            artifact: wheel-linux-x86_64
          - runner: ubuntu-24.04-arm
            container: quay.io/pypa/manylinux_2_28_aarch64
            tag: manylinux_2_28_aarch64
            artifact: wheel-linux-aarch64
    runs-on: ${{ matrix.runner }}
    container: ${{ matrix.container }}
    env:
      PYBIN: /opt/python/cp312-cp312/bin
    steps:
      - uses: actions/checkout@v4

      # libempyrean statically vendors OpenSSL on Linux (empyrean-c links the
      # engine, whose HTTP client pulls native-tls -> openssl). The vendored
      # build compiles OpenSSL from source via openssl-src, which needs perl.
      - name: Install build deps (perl for vendored OpenSSL)
        run: dnf install -y perl-core

      # The container checks out the workspace under a different owner; let git
      # (used by cargo to fetch the private engine deps) operate on it.
      - name: Mark workspace safe for git
        run: git config --global --add safe.directory '*'

      - name: Configure git for private dependencies
        run: git config --global url."https://x-access-token:${{ secrets.GH_PAT }}@github.com/".insteadOf "ssh://git@github.com/"

      - name: Install Rust toolchain
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --profile minimal --default-toolchain stable
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Install maturin
        run: $PYBIN/python -m pip install --upgrade maturin

      # Build the engine inside the container so libempyrean links glibc 2.28.
      - name: Build libempyrean (release)
        run: cargo build -p empyrean-c --release

      # Bundle the engine beside the extension (found at run time via dladdr);
      # pyproject's [tool.maturin].include ships it in the wheel only.
      - name: Bundle libempyrean beside the extension
        run: |
          set -euo pipefail
          cp target/release/libempyrean.so empyrean-py/python/empyrean/
          echo "bundled libempyrean.so -> empyrean-py/python/empyrean/"

      # maturin tags the wheel manylinux_2_28 (the container's glibc floor) and
      # --auditwheel=repair validates the extension against that policy; --strip
      # keeps internal symbols out. The bundled engine, built against the same
      # 2.28 floor, is left in place beside the extension.
      - name: Build wheel (stripped, manylinux_2_28)
        run: cd empyrean-py && "$PYBIN/maturin" build --release --strip --auditwheel=repair -i "$PYBIN/python" --out ../target/wheels

      - name: Verify wheel symbols stripped (no internal leak)
        run: |
          whl=$(ls target/wheels/*.whl | head -1)
          tmp=$(mktemp -d)
          "$PYBIN/python" -m zipfile -e "$whl" "$tmp"
          libs=$(find "$tmp" \( -name "*.so" -o -name "*.dylib" \))
          echo "Inspecting bundled libraries:"; echo "$libs"
          leaked=$(for f in $libs; do nm "$f" 2>/dev/null; done | grep -ioE "empyrean_core|villeneuve|scott|nolan|hyperjet" | sort -u || true)
          if [ -n "$leaked" ]; then
            echo "::error::internal crate symbols leaked into the wheel:"; echo "$leaked"; exit 1
          fi
          echo "OK: no internal symbols in the wheel's bundled libraries"

      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: target/wheels/*.whl

  # ── Publish wheels to PyPI ─────────────────────────────────
  publish-pypi:
    name: Publish wheel to PyPI
    needs: [wheels-linux, wheels-macos]
    runs-on: ubuntu-latest
    # Trusted Publishing (OIDC): no token. `id-token: write` mints the OIDC
    # token PyPI verifies against the trusted-publisher config (repo +
    # workflow + environment). The `pypi` environment SHOULD carry a
    # required-reviewer gate so this job pauses for manual approval; the
    # guard step below fails the job CLOSED if that gate is not actually
    # configured, so a publish can never run unreviewed.
    environment: pypi
    permissions:
      id-token: write
    steps:
      - name: Require an armed reviewer gate (fail closed)
        env:
          # Needs read access to environment settings: a classic PAT with
          # `repo` scope, or a fine-grained token with Administration:read.
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          set -uo pipefail
          env_name=pypi
          if ! rules=$(gh api "repos/${{ github.repository }}/environments/${env_name}" \
                          --jq '[.protection_rules[].type] | join(",")' 2>/tmp/gate_err); then
            echo "::error::Cannot read the '${env_name}' environment. The token (GH_PAT) needs"
            echo "repo scope (classic) or Administration:read (fine-grained) to inspect it."
            cat /tmp/gate_err || true
            exit 1
          fi
          echo "'${env_name}' protection rules: ${rules:-<none>}"
          case "$rules" in
            *required_reviewers*) echo "OK: '${env_name}' requires a reviewer before publishing." ;;
            *) echo "::error::'${env_name}' has no required-reviewers gate. Refusing to publish unreviewed."
               echo "Arm it: repo Settings > Environments > ${env_name} > Required reviewers, then re-run."
               exit 1 ;;
          esac

      - name: Download wheels
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Stage wheels for upload
        run: |
          mkdir -p dist
          find artifacts -name '*.whl' -exec cp {} dist/ \;
          ls -la dist

      - name: Publish to PyPI (Trusted Publishing / OIDC)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          skip-existing: true

  # ── Publish Rust crates to crates.io ────────────────────────
  # Sequenced: empyrean-sys → empyrean → empyrean-cli, with a
  # pause for the index to catch up between dependent crates.
  # empyrean-c is `publish = false` (cdylib only) and is not
  # pushed to crates.io.
  publish-crates:
    name: Publish to crates.io
    needs: [verify]
    runs-on: ubuntu-latest
    # The `crates-io` environment SHOULD carry a required-reviewer gate (and,
    # ideally, hold CARGO_REGISTRY_TOKEN as an environment-scoped secret) so
    # all three crate publishes pause for manual approval. The guard step
    # below fails the job CLOSED if that gate is not configured, so the
    # publishes can never run unreviewed.
    environment: crates-io
    # `cargo publish` verifies each crate by building it from the packaged
    # tarball, where build.rs's CARGO_MANIFEST_DIR-relative path to the engine
    # no longer resolves. Point empyrean-sys's build.rs at the libempyrean built
    # below so the verify build can resolve and record a path. The library is
    # opened at run time (not linked) and the bindings are pre-generated, so
    # there is no header / libclang dependency.
    env:
      EMPYREAN_LIB_DIR: ${{ github.workspace }}/target/release
    steps:
      - name: Require an armed reviewer gate (fail closed)
        env:
          # Needs read access to environment settings: a classic PAT with
          # `repo` scope, or a fine-grained token with Administration:read.
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          set -uo pipefail
          env_name=crates-io
          if ! rules=$(gh api "repos/${{ github.repository }}/environments/${env_name}" \
                          --jq '[.protection_rules[].type] | join(",")' 2>/tmp/gate_err); then
            echo "::error::Cannot read the '${env_name}' environment. The token (GH_PAT) needs"
            echo "repo scope (classic) or Administration:read (fine-grained) to inspect it."
            cat /tmp/gate_err || true
            exit 1
          fi
          echo "'${env_name}' protection rules: ${rules:-<none>}"
          case "$rules" in
            *required_reviewers*) echo "OK: '${env_name}' requires a reviewer before publishing." ;;
            *) echo "::error::'${env_name}' has no required-reviewers gate. Refusing to publish unreviewed."
               echo "Arm it: repo Settings > Environments > ${env_name} > Required reviewers, then re-run."
               exit 1 ;;
          esac

      - uses: actions/checkout@v4

      - name: Configure git for private dependencies
        run: git config --global url."https://x-access-token:${{ secrets.GH_PAT }}@github.com/".insteadOf "ssh://git@github.com/"

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          rustflags: ""

      # Build libempyrean so `cargo publish`'s verification step can resolve its
      # path (via EMPYREAN_LIB_DIR). It is opened at run time, not linked.
      - name: Build libempyrean (release)
        run: cargo build -p empyrean-c --release

      # ── Release automation for the crates.io download path ─────────────
      # empyrean-sys's published build.rs downloads the prebuilt libempyrean for
      # the consumer's platform from THIS release and verifies it against the
      # SHA-256 already committed in empyrean-sys/checksums.txt. Those tarballs
      # are not reproducible, so they are NOT rebuilt here: prepare-release.yml
      # built and pinned them before the tag was cut. Reuse the exact tarballs
      # from that run, re-verify them against the committed hashes (fail closed
      # on any mismatch — no regeneration, no silent fallback), and serve them
      # from the release so the published hashes match the artifacts byte for
      # byte. (The FFI bindings are pre-generated and committed — see
      # empyrean-sys/src/bindings.rs — so nothing is regenerated at publish time.)
      - name: Reuse, verify, and serve the prepared libempyrean tarballs
        env:
          # The default workflow token inherits this workflow's `contents:
          # write` (gh release create/upload) and `actions: read` (gh run
          # download / list). GH_PAT is scoped only for reading environment
          # settings.
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="${GITHUB_REF#refs/tags/}"

          # Reuse the tarballs prepared by prepare-release.yml — never rebuild
          # them (non-reproducible bytes). Pick the latest successful Prepare
          # Release run on main; the per-asset hash check below fails the
          # release closed if it is the wrong or a stale one.
          prep_run=$(gh run list --workflow=prepare-release.yml --branch main \
                       --status success --limit 1 --json databaseId \
                       --jq '.[0].databaseId')
          if [ -z "$prep_run" ] || [ "$prep_run" = "null" ]; then
            echo "::error::No successful 'Prepare Release' run on main. Run prepare-release.yml before tagging."
            exit 1
          fi
          echo "Reusing libempyrean tarballs from Prepare Release run ${prep_run}."
          rm -rf libempyrean-dist
          gh run download "$prep_run" --pattern 'libempyrean-*' --dir libempyrean-dist

          # Verify each committed checksum against the prepared tarball. A
          # mismatch means the tag was cut from a commit whose checksums.txt
          # does not match the prepared binaries — refuse to publish.
          fail=0
          pinned=0
          while read -r stem want; do
            case "$stem" in ''|\#*) continue ;; esac
            pinned=$((pinned + 1))
            tarball=$(find libempyrean-dist -name "${stem}.tar.gz" | head -1)
            if [ -z "$tarball" ]; then
              echo "::error::prepared tarball ${stem}.tar.gz not found in the Prepare Release artifacts"
              fail=1; continue
            fi
            got=$(sha256sum "$tarball" | awk '{print $1}')
            if [ "$got" != "$want" ]; then
              echo "::error::${stem}: committed ${want} != prepared ${got}. Re-run prepare-release for this commit."
              fail=1
            else
              printf "  OK  %-26s %s\n" "$stem" "$got"
            fi
          done < empyrean-sys/checksums.txt
          [ "$fail" -eq 0 ] || { echo "Checksum verification failed — refusing to publish."; exit 1; }

          # A verify that checks nothing must never report success. Require at
          # least one pinned entry (so an empty/garbled/truncated checksums.txt
          # fails closed instead of passing vacuously), and require a 1:1 match
          # with the tarballs we are about to serve (so a tarball the loop never
          # verified — e.g. a new target not yet pinned — cannot ship unchecked).
          served=$(find libempyrean-dist -name 'libempyrean-*.tar.gz' | wc -l | tr -d ' ')
          if [ "$pinned" -lt 1 ]; then
            echo "::error::empyrean-sys/checksums.txt pins no libempyrean tarballs — refusing to publish."
            exit 1
          fi
          if [ "$pinned" -ne "$served" ]; then
            echo "::error::pinned ${pinned} tarball(s) but the Prepare Release run served ${served} — every served tarball must be pinned. Refusing to publish."
            exit 1
          fi
          echo "Verified ${pinned} pinned tarball(s), all matching the prepared bytes."

          # Serve the verified tarballs from the release so build.rs can download
          # them the instant the crate is live; the Create Release job finalises
          # the notes afterwards. These are the prepared bytes, so they match the
          # committed hashes exactly.
          gh release view "$tag" >/dev/null 2>&1 \
            || gh release create "$tag" --prerelease --title "$tag" --notes "Publishing…"
          find libempyrean-dist -name 'libempyrean-*.tar.gz' \
            -exec gh release upload "$tag" {} --clobber \;
          echo "Verified and served libempyrean tarballs for ${tag}."

      - name: Publish empyrean-sys
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p empyrean-sys --allow-dirty

      - name: Wait for crates.io to index empyrean-sys
        run: sleep 30

      - name: Publish empyrean
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p empyrean --allow-dirty

      - name: Wait for crates.io to index empyrean
        run: sleep 30

      - name: Publish empyrean-cli
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p empyrean-cli --allow-dirty

  # ── Create GitHub Release ──────────────────────────────────
  release:
    name: Create Release
    needs: [cli, wheels-linux, wheels-macos, publish-pypi, publish-crates]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Extract tag annotation as release notes
        id: notes
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          git fetch --force origin "refs/tags/${tag}:refs/tags/${tag}"
          {
            echo 'body<<__EOF__'
            git tag -l --format='%(contents)' "$tag"
            echo '__EOF__'
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # Use the annotated tag message as the release body (not GitHub's
          # auto-generated changelog). Pre-release tags (-rc/-beta/-alpha) are
          # flagged so the final vX.Y.Z stays the "Latest" release.
          body: ${{ steps.notes.outputs.body }}
          generate_release_notes: false
          prerelease: ${{ contains(github.ref_name, 'rc') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') }}
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.whl
