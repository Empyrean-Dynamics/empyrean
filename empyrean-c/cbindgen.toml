language = "C"
header = """/*
 * empyrean - High-fidelity orbital propagation, ephemeris generation,
 * and orbit determination.
 *
 * This header is auto-generated by cbindgen. Do not edit by hand.
 */"""
include_guard = "EMPYREAN_H"
include_version = true
tab_width = 4
style = "tag"
sys_includes = ["stddef.h", "stdint.h", "stdbool.h"]
no_includes = true
after_includes = """

/* Forward declarations of opaque handles. The underlying Rust types
 * are not exposed through this C API; callers only manipulate
 * pointers. */
typedef struct Context Context;
typedef struct Session Session;
"""

[export]
item_types = ["structs", "enums", "unions", "typedefs", "opaque", "functions", "constants"]
prefix = ""

[export.rename]

[fn]
prefix = ""
rename_args = "None"

[enum]
prefix_with_name = true
rename_variants = "ScreamingSnakeCase"

[parse]
parse_deps = false
